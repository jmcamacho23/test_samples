name: Run Python scrapers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: windows-latest

    steps:
      - name: Checkout main branch repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f ${{ github.workspace }}/requirements.txt ]; then pip install -r ${{ github.workspace }}/requirements.txt; fi

      - name: Run scrapers
        run: |
          for file in tests/scrapers/*.py; do
          if [ -f "$file" ]; then
          echo "Running file: '$file' "
          python "$file"; fi
          done
