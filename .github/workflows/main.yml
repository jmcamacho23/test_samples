name: Run Pytest tests

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-pytests:
    runs-on: windows-latest

    steps:
      - name: Checkout main branch repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "${{ github.workspace }}/requirements.txt" ) { pip install -r "${{ github.workspace }}/requirements.txt" }

      - name: Initialize Playwright after
        run: |
          python -m playwright install

      - name: Run scrapers
        run: |
          python -m pytest --html=report.html --self-contained-html
          shell: pwsh

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-windows-report
          path: report.html